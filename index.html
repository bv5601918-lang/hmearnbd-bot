<div id="loginBox">

    <div id="devText">RAJ RTB AI SYSTEM ACTIVE</div>
    <div id="result">---</div>
    <div id="nums"></div>

    <div id="logs"></div>
    <button id="websiteBtn" onclick="openWebsite()">🌐 ওয়েবসাইট</button>
</div>

<!-- IFRAME OVERLAY (ওয়েবসাইট এখানে লোড হবে) -->
<div id="iframeOverlay">
    <button id="closeIframe" onclick="closeWebsite()">✖ বন্ধ করুন</button>
    <iframe id="siteFrame" src=""></iframe>
</div>

<!-- FLOATING WIDGET (সবসময় দৃশ্যমান z-index:9999) -->
<div id="floatWidget">
    <div class="fw-title">RAJ RTB AI</div>
    <div class="fw-result" id="fw-result">---</div>
    <div class="fw-nums" id="fw-nums"></div>
    <div class="fw-timer" id="fw-timer">⏱ 30s</div>
</div>

<script>
const PASSWORD = "rdraj001";
const WEBSITE  = "https://hgnice.bet/#/register?invitationCode=531211974484";

let countdown = 30, started = false, lastType = "";

/* LOGIN */
function login(){
    const pass = document.getElementById("password").value;
    const msg  = document.getElementById("msg");
    if(pass === PASSWORD){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("floatWidget").style.display = "block";
        if(!started){ started=true; startSystem(); startLogs(); }
    } else {
        msg.innerText = "❌ রাজ এর নানির খালি ঘর!";
    }
}

/* OPEN WEBSITE IN IFRAME — widget stays on top */
function openWebsite(){
    document.getElementById("siteFrame").src = WEBSITE;
    document.getElementById("iframeOverlay").style.display = "block";
}

function closeWebsite(){
    document.getElementById("iframeOverlay").style.display = "none";
    document.getElementById("siteFrame").src = "";
}

/* DRAGGABLE WIDGET */
(function(){
    const el = document.getElementById("floatWidget");
    let drag=false, sx, sy, ox, oy;

    el.addEventListener("mousedown", e=>{
        drag=true; sx=e.clientX; sy=e.clientY;
        ox=el.offsetLeft; oy=el.offsetTop;
        el.style.right="auto"; el.style.bottom="auto";
    });
    document.addEventListener("mousemove", e=>{
        if(!drag) return;
        el.style.left=(ox+e.clientX-sx)+"px";
        el.style.top =(oy+e.clientY-sy)+"px";
    });
    document.addEventListener("mouseup", ()=>drag=false);

    el.addEventListener("touchstart", e=>{
        drag=true; sx=e.touches[0].clientX; sy=e.touches[0].clientY;
        ox=el.offsetLeft; oy=el.offsetTop;
        el.style.right="auto"; el.style.bottom="auto";
    });
    document.addEventListener("touchmove", e=>{
        if(!drag) return;
        el.style.left=(ox+e.touches[0].clientX-sx)+"px";
        el.style.top =(oy+e.touches[0].clientY-sy)+"px";
    });
    document.addEventListener("touchend", ()=>drag=false);
})();

/* HELPERS */
function getType(){ return Math.random()<0.5?"BIG":"SMALL"; }

function getNumbers(type){
    let bigNums  = [5,6,7,8,9];
    let smallNums = [0,1,2,3,4];
    let big   = bigNums[Math.floor(Math.random()*bigNums.length)];
    let small = smallNums[Math.floor(Math.random()*smallNums.length)];
    return [big, small];
}

/* SYSTEM TIMER */
function startSystem(){
    update();
    setInterval(()=>{
        countdown--;
        document.getElementById("timer").innerText = countdown;
        document.getElementById("fw-timer").innerText = "⏱ "+countdown+"s";
        if(countdown<=0){ countdown=30; update(); }
    },1000);
}

/* UPDATE */
function update(){
    let type = getType();
    if(type===lastType) type = type==="BIG"?"SMALL":"BIG";
    lastType = type;
    const nums = getNumbers(type);

    document.getElementById("result").innerText = type;
    document.getElementById("nums").innerText   = nums.join("  ");
    document.getElementById("fw-result").innerText = type;
    document.getElementById("fw-nums").innerText   = nums.join(" ");
    document.getElementById("fw-result").style.color = type==="BIG"?"#ffd60a":"#f15bb5";
}

function startLogs(){

    setInterval(()=>{
        document.getElementById("logs").innerText = logs[Math.floor(Math.random()*logs.length)];
    },900);
}
