<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:white;
    overflow:hidden;
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#mainTitle{
    font-size:28px;
    font-weight:900;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    text-align:center;
    border-radius:10px;
    border:none;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0077b6;
    color:white;
    font-weight:bold;
}

/* ERROR */
#message{
    text-align:center;
    font-weight:bold;
    color:#ff4d6d;
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* HEADER TEXT */
#devText{
    font-size:22px;
    font-weight:900;
    margin-top:10px;
}

/* BIG SMALL */
#result{
    font-size:120px;
    font-weight:900;
}

/* TIMER */
#timer{
    font-size:60px;
    color:#ffd60a;
    font-weight:900;
}

/* LIVE TEXT */
#animatedLine{
    margin-top:15px;
    font-weight:bold;
    transition:0.3s;
}

/* LOGS */
#logs{
    margin-top:20px;
    height:120px;
    overflow:hidden;
    font-size:12px;
    color:#00ff99;
    border:1px solid #00ff99;
    padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div id="mainTitle">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="message"></div>

</div>

<!-- APP -->
<div id="app">

    <div id="devText">🔥 MEHEDI VAI BEST DEVELOPER BANGLADESH NO.1 🔥</div>

    <div id="result">---</div>

    <div id="timer">30</div>

    <div id="animatedLine"></div>

    <div id="logs"></div>

</div>

<script>

const PASSWORD = "MEHEDIVAI115";

let countdown = 30;
let started = false;
let alarmInterval;

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    if(pass === PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        if(!started){
            started = true;
            startSystem();
            startLogs();
            startTextCycle();
        }

    } else {
        msg.innerText = "❌ Wrong Password! Contact Mehedi Vai";
        startAlarm();
    }
}

/* 🔊 CONTINUOUS SIREN ALARM */
function startAlarm(){

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();

    alarmInterval = setInterval(()=>{

        const o = ctx.createOscillator();
        const g = ctx.createGain();

        o.type = "sawtooth";
        o.connect(g);
        g.connect(ctx.destination);

        g.gain.value = 0.3;

        o.frequency.setValueAtTime(500, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.2);
        o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.5);

        o.start();
        o.stop(ctx.currentTime + 0.6);

    },650);
}

/* BIG SMALL */
function random(){
    return Math.random() < 0.5 ? "BIG" : "SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText = random();

    setInterval(()=>{

        countdown--;
        document.getElementById("timer").innerText = countdown;

        if(countdown <= 0){
            countdown = 30;
            document.getElementById("result").innerText = random();
        }

    },1000);
}

/* LOGS */
function startLogs(){

    const logs = [
        "System booting...",
        "Security scanning...",
        "AI engine active...",
        "Network stable...",
        "Encryption enabled...",
        "Firewall running..."
    ];

    setInterval(()=>{

        document.getElementById("logs").innerText =
        logs[Math.floor(Math.random() * logs.length)];

    },1200);
}

/* 7 COLOR TEXT CYCLE */
function startTextCycle(){

    const el = document.getElementById("animatedLine");

    const texts = [
        "💎 MEHEDI VAI BEST DEVELOPER BANGLADESH NO.1 💎",
        "🔥 SYSTEM ONLINE 🔥",
        "⚡ AI CORE ACTIVE ⚡",
        "🔒 SECURITY ENABLED 🔒",
        "🚀 ENGINE RUNNING 🚀",
        "🌐 NETWORK OK 🌐",
        "💠 PREMIUM MODE 💠"
    ];

    let i = 0;

    setInterval(()=>{

        el.style.opacity = 0;

        setTimeout(()=>{

            el.innerText = texts[i % texts.length];
            i++;

            el.style.opacity = 1;

        },300);

    },1200);
}

</script>

</body>
</html>
