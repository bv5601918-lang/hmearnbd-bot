<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#001219,#000,#000814);
    color:white;
    overflow:hidden;
}

/* SCAN EFFECT */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,transparent,rgba(0,255,200,0.05),transparent);
    animation:scan 3s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    0%{transform:translateY(-100%)}
    100%{transform:translateY(100%)}
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#mainTitle{
    font-size:30px;
    font-weight:900;
    text-align:center;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    background-size:400% 400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 3s linear infinite;
}

@keyframes glow{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00b4d8,#0077b6);
    color:white;
}

/* MESSAGE */
#message{
    font-weight:bold;
    text-align:center;
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* DEV TEXT */
#devText{
    font-size:24px;
    font-weight:900;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s linear infinite;
}

/* BIG SMALL */
#result{
    font-size:130px;
    font-weight:900;
    margin-top:20px;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shake 0.8s infinite alternate;
}

@keyframes shake{
    from{transform:scale(0.95) rotate(-1deg)}
    to{transform:scale(1.05) rotate(1deg)}
}

/* TIMER */
#timer{
    font-size:60px;
    font-weight:900;
    color:#fee440;
}

/* LIVE */
#liveText{
    font-size:16px;
    color:#00f5d4;
}

/* TERMINAL LOGS */
#logs{
    margin-top:20px;
    height:120px;
    overflow:hidden;
    font-size:12px;
    color:#00ff99;
    text-align:left;
    padding:10px;
    border:1px solid #00ff99;
    border-radius:10px;
    animation:glow 3s linear infinite;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div id="mainTitle">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="message"></div>

</div>

<!-- APP -->
<div id="app">

    <div id="devText">🔥 MEHEDI VAI AI SYSTEM DEVELOPER 🔥</div>

    <div id="result">---</div>

    <div id="timer">30</div>

    <div id="liveText">⚡ REAL TIME LIVE ⚡</div>

    <!-- TERMINAL LOG -->
    <div id="logs"></div>

</div>

<script>

const PASSWORD = "MEHEDIVAI115";
let countdown = 30;
let started = false;

/* TERMINAL LOGS */
const logs = [
"System booting...",
"Connecting server...",
"Security scan running...",
"AI module loading...",
"Network stable...",
"Data sync active...",
"Encryption enabled..."
];

function startLogs(){
    let i = 0;
    setInterval(()=>{
        let box = document.getElementById("logs");
        box.innerText = logs[i % logs.length];
        i++;
    },1200);
}

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    if(pass === PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        if(!started){
            started=true;
            startSystem();
            startLogs();
        }

    }else{

        msg.style.color="#ff4d6d";
        msg.innerText="❌ Wrong Password! Contact Admin for access";

        playAlarm(); // SOUND
    }
}

/* ALARM SOUND (BEEP + SIREN FEEL) */
function playAlarm(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();

    let o = ctx.createOscillator();
    let g = ctx.createGain();

    o.type = "sawtooth";
    o.frequency.value = 600;

    o.connect(g);
    g.connect(ctx.destination);

    o.start();

    setTimeout(()=>o.frequency.value = 900,300);
    setTimeout(()=>o.frequency.value = 500,600);

    setTimeout(()=>{
        o.stop();
        ctx.close();
    },900);
}

/* RANDOM */
function randomResult(){
    return Math.random()<0.5?"BIG":"SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText=randomResult();

    setInterval(()=>{

        countdown--;

        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            document.getElementById("result").innerText=randomResult();
        }

    },1000);
}

</script>

</body>
</html>
