<!DOCTYPE html>
<html>
<head>
  <title>Mini App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="page">
  <h2>🏠 Home</h2>

  <p>👤 User: Demo</p>
  <p>💰 Balance: ৳0</p>

  <div class="box">
    <button onclick="show('deposit')">Deposit</button>
    <button onclick="show('withdraw')">Withdraw</button>
  </div>
</div>

<!-- TASKS -->
<div id="tasks" class="page" style="display:none;">
  <h2>📋 Tasks</h2>
  <p>All tasks will appear here</p>
</div>

<!-- PACKAGES -->
<div id="packages" class="page" style="display:none;">
  <h2>📦 Packages</h2>
  <p>Packages will appear here</p>
</div>

<!-- MAIN MENU -->
<div id="menu" class="page" style="display:none;">
  <h2>☰ Main Menu</h2>
  <p>User Settings / Info</p>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page" style="display:none;">
  <h2>💳 Deposit</h2>

  <p>Send Money: 01793075384</p>

  <input placeholder="Amount">
  <input placeholder="Transaction ID">

  <button>Submit Deposit</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page" style="display:none;">
  <h2>💸 Withdraw</h2>

  <p>Minimum: ৳110</p>

  <select>
    <option>bKash</option>
    <option>Nagad</option>
  </select>

  <input placeholder="Number">
  <input placeholder="Amount">

  <button>Request Withdraw</button>
</div>

<!-- BOTTOM NAV (ONLY 4 BUTTONS) -->
<div class="menu">
  <button onclick="show('home')">Home</button>
  <button onclick="show('tasks')">Tasks</button>
  <button onclick="show('packages')">Packages</button>
  <button onclick="show('menu')">Main Menu</button>
</div>

<script src="app.js"></script>

</body>
</html>
