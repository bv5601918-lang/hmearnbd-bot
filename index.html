<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:white;
    overflow:hidden;
}

/* RED FLASH SCREEN */
.flash{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
    animation:none;
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#title{
    font-size:28px;
    font-weight:900;
    text-align:center;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0077b6;
    color:white;
    font-weight:bold;
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* HEADER */
#devText{
    font-size:20px;
    font-weight:900;
    margin-top:10px;
    animation:glow 2s linear infinite;
}

@keyframes glow{
    0%{opacity:1}
    50%{opacity:0.4}
    100%{opacity:1}
}

/* BIG SMALL */
#result{
    font-size:110px;
    font-weight:900;
}

/* TIMER */
#timer{
    font-size:55px;
    color:#ffd60a;
    font-weight:900;
}

/* LOG BOX */
#logs{
    margin-top:20px;
    height:120px;
    border:1px solid #00ff99;
    padding:10px;
    font-size:12px;
    color:#00ff99;
    overflow:hidden;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- LOGIN -->
<div id="loginBox">

    <div id="title">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="msg"></div>

</div>

<!-- APP -->
<div id="app">

    <div id="devText">MEHEDI VAI TOP COMMUNITY BIG BOSS NO.1 DEVELOPER BANGLADESH</div>

    <div id="result">---</div>

    <div id="timer">30</div>

    <div id="logs"></div>

</div>

<script>

const PASSWORD="MEHEDIVAI115";
let countdown=30;
let started=false;
let alarmInt;

/* LOGIN */
function login(){

    let pass=document.getElementById("password").value;
    let msg=document.getElementById("msg");

    if(pass===PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        if(!started){
            started=true;
            startSystem();
            startLogs();
        }

    } else {

        msg.innerText="❌ Wrong Password! Contact Admin";

        startAlarm();
        vibrate();
        flashScreen();
    }
}

/* 🔊 HACK STYLE ALARM */
function startAlarm(){

    const ctx=new (window.AudioContext||window.webkitAudioContext)();

    alarmInt=setInterval(()=>{

        let o=ctx.createOscillator();
        let g=ctx.createGain();

        o.type="square";

        let f=300+Math.random()*700;

        o.frequency.setValueAtTime(f,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(f+300,ctx.currentTime+0.1);
        o.frequency.exponentialRampToValueAtTime(f-200,ctx.currentTime+0.2);

        g.gain.value=0.3;

        o.connect(g);
        g.connect(ctx.destination);

        o.start();
        o.stop(ctx.currentTime+0.25);

    },180);
}

/* 📳 VIBRATION */
function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate([200,100,300,100,500,200,700]);
    }
}

/* 🔴 FLASH SCREEN */
function flashScreen(){

    let f=document.getElementById("flash");

    f.style.animation="none";
    void f.offsetWidth;

    f.style.animation="flashAnim 0.2s 10";

}

/* BIG SMALL */
function random(){
    return Math.random()<0.5?"BIG":"SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText=random();

    setInterval(()=>{

        countdown--;
        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            document.getElementById("result").innerText=random();
        }

    },1000);
}

/* LOGS SMALL ROTATION */
function startLogs(){

    const logs=[
    "network stable...",
    "security active...",
    "system running...",
    "ai engine online...",
    "data sync..."
    ];

    setInterval(()=>{

        document.getElementById("logs").innerText=
        logs[Math.floor(Math.random()*logs.length)];

    },900);
}

/* FLASH KEYFRAME */
const style=document.createElement("style");
style.innerHTML=`
@keyframes flashAnim{
0%{opacity:0}
50%{opacity:0.8}
100%{opacity:0}
}`;
document.head.appendChild(style);

</script>

</body>
</html>
