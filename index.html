<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJ RTB AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow:hidden;

    background-image: url("https://i.postimg.cc/m29d9Z6t/IMG-20260610-145538-764.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

.flash{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#title{
    font-size:28px;
    font-weight:900;
    text-align:center;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

input,button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    background:#0077b6;
    color:white;
    font-weight:bold;
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* MENU BUTTONS */
#menu{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    align-items:center;
}

#menu button{
    width:80%;
    max-width:300px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

#aiBtn{
    background:#00bbf9;
    color:white;
}

#webBtn{
    background:#fee440;
    color:black;
}

/* AI BOX */
#aiBox{
    display:none;
}

#devText{
    font-size:18px;
    font-weight:900;
    animation:glow 2s infinite;
}

@keyframes glow{
    0%{opacity:1}
    50%{opacity:0.4}
    100%{opacity:1}
}

#result{
    font-size:45px;
    font-weight:900;
    margin-top:20px;
}

#nums{
    font-size:30px;
    margin-top:10px;
    color:#00ff99;
}

#timer{
    font-size:55px;
    color:#ffd60a;
    font-weight:900;
}

#logs{
    margin-top:20px;
    height:120px;
    border:1px solid #00ff99;
    padding:10px;
    font-size:12px;
    color:#00ff99;
}

/* WEBSITE VIEW */
#siteBox{
    display:none;
    width:100%;
    height:80vh;
    margin-top:10px;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- LOGIN -->
<div id="loginBox">

    <div id="title">RAJ RTB AI SYSTEM</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="msg"></div>

</div>

<!-- APP -->
<div id="app">

    <div id="menu">

        <button id="aiBtn" onclick="showAI()">🤖 AI SYSTEM</button>

        <button id="webBtn" onclick="showSite()">🌐 WEBSITE</button>

    </div>

    <!-- AI SECTION -->
    <div id="aiBox">

        <div id="devText">RAJ RTB AI SYSTEM ACTIVE</div>

        <div id="result">---</div>
        <div id="nums"></div>

        <div id="timer">30</div>

        <div id="logs"></div>

    </div>

    <!-- WEBSITE SECTION -->
    <div id="siteBox">
        <iframe src="https://hgnice.bet/#/register?invitationCode=531211974484"></iframe>
    </div>

</div>

<script>

const PASSWORD="rdraj001";

let countdown=30;
let started=false;
let lastType="";

/* LOGIN */
function login(){

    let pass=document.getElementById("password").value;
    let msg=document.getElementById("msg");

    if(pass===PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        showAI(); // default open AI

        if(!started){
            started=true;
            startSystem();
            startLogs();
        }

    } else {
        msg.innerText="❌ Wrong Password";
    }
}

/* SHOW AI */
function showAI(){

    document.getElementById("aiBox").style.display="block";
    document.getElementById("siteBox").style.display="none";

}

/* SHOW SITE */
function showSite(){

    document.getElementById("aiBox").style.display="none";
    document.getElementById("siteBox").style.display="block";

}

/* SYSTEM */
function getType(){
    return Math.random()<0.5?"BIG":"SMALL";
}

function getNumbers(type){

    let arr = type==="BIG"
        ? [9.,0.,5.,8.]
        : [0.,9.,2.,1.,4.,7];

    arr = arr.sort(()=>Math.random()-0.5);

    return arr.slice(0,3);
}

function startSystem(){

    update();

    setInterval(()=>{

        countdown--;
        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            update();
        }

    },1000);
}

function update(){

    let type=getType();

    if(type===lastType){
        type = type==="BIG"?"SMALL":"BIG";
    }

    lastType=type;

    let nums=getNumbers(type);

    document.getElementById("result").innerText=type;
    document.getElementById("nums").innerText=nums.join("  ");
}

/* LOGS */
function startLogs(){

    const logs=[
    "mehedi ai system...",
    "raj ai system...",
    "system running...",
    "ai engine online...",
    "2 step ai hack..."
    ];

    setInterval(()=>{

        document.getElementById("logs").innerText=
        logs[Math.floor(Math.random()*logs.length)];

    },900);
}

</script>

</body>
</html>
